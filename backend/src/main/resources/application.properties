spring.application.name=livequiz-backend

# Server Config
spring.profiles.active=postgres

## Throw 404 instead of default whitelabel error page
spring.mvc.throw-exception-if-no-handler-found=true
## Disable default static resource handling - used to throw 404 for unknown paths
spring.web.resources.add-mappings=false

# Security Logging
logging.level.org.springframework.security=DEBUG

# LiveQuiz domain config
livequiz.submission-cooldown-seconds=${LIVEQUIZ_SUBMISSION_COOLDOWN_SECONDS:30}
livequiz.invite-base-url=${LIVEQUIZ_INVITE_BASE_URL:http://localhost:4200/student/join}
livequiz.invite-expiration-hours=${LIVEQUIZ_INVITE_EXPIRATION_HOURS:24}
livequiz.teacher-role-classification-enabled=${LIVEQUIZ_TEACHER_ROLE_CLASSIFICATION_ENABLED:false}
livequiz.student-email-allowed-domain=${LIVEQUIZ_STUDENT_EMAIL_ALLOWED_DOMAIN:ynov.com}
livequiz.student-email-verification-ttl-minutes=${LIVEQUIZ_STUDENT_EMAIL_VERIFICATION_TTL_MINUTES:30}
livequiz.student-email-verification-resend-cooldown-seconds=${LIVEQUIZ_STUDENT_EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
livequiz.student-email-verification-max-per-hour=${LIVEQUIZ_STUDENT_EMAIL_VERIFICATION_MAX_PER_HOUR:5}
livequiz.student-email-verification-url-base=${LIVEQUIZ_STUDENT_EMAIL_VERIFICATION_URL_BASE:http://localhost:4200/student/verify-email}
livequiz.student-email-verification-smtp-enabled=${LIVEQUIZ_STUDENT_EMAIL_VERIFICATION_SMTP_ENABLED:false}
livequiz.student-email-verification-from=${LIVEQUIZ_STUDENT_EMAIL_VERIFICATION_FROM:no-reply@livequiz.local}
livequiz.jwt.secret=${LIVEQUIZ_JWT_SECRET:}

# Messaging / RabbitMQ config
livequiz.messaging.enabled=${LIVEQUIZ_MESSAGING_ENABLED:false}
livequiz.messaging.exchange=${LIVEQUIZ_MESSAGING_EXCHANGE:livequiz.events}

livequiz.messaging.email.main-queue=${LIVEQUIZ_MESSAGING_EMAIL_MAIN_QUEUE:livequiz.email.dispatch.v1}
livequiz.messaging.email.retry-queue=${LIVEQUIZ_MESSAGING_EMAIL_RETRY_QUEUE:livequiz.email.dispatch.retry.v1}
livequiz.messaging.email.dlq=${LIVEQUIZ_MESSAGING_EMAIL_DLQ:livequiz.email.dispatch.dlq.v1}
livequiz.messaging.email.requested-routing-key=${LIVEQUIZ_MESSAGING_EMAIL_REQUESTED_ROUTING_KEY:email.dispatch.requested.v1}
livequiz.messaging.email.retry-routing-key=${LIVEQUIZ_MESSAGING_EMAIL_RETRY_ROUTING_KEY:email.dispatch.retry.v1}
livequiz.messaging.email.failed-routing-key=${LIVEQUIZ_MESSAGING_EMAIL_FAILED_ROUTING_KEY:email.dispatch.failed.v1}
livequiz.messaging.email.max-attempts=${LIVEQUIZ_MESSAGING_EMAIL_MAX_ATTEMPTS:6}
livequiz.messaging.email.consumer-concurrency=${LIVEQUIZ_MESSAGING_EMAIL_CONSUMER_CONCURRENCY:1}

livequiz.messaging.submission.main-queue=${LIVEQUIZ_MESSAGING_SUBMISSION_MAIN_QUEUE:livequiz.submission.evaluate.v1}
livequiz.messaging.submission.retry-queue=${LIVEQUIZ_MESSAGING_SUBMISSION_RETRY_QUEUE:livequiz.submission.evaluate.retry.v1}
livequiz.messaging.submission.dlq=${LIVEQUIZ_MESSAGING_SUBMISSION_DLQ:livequiz.submission.evaluate.dlq.v1}
livequiz.messaging.submission.requested-routing-key=${LIVEQUIZ_MESSAGING_SUBMISSION_REQUESTED_ROUTING_KEY:submission.evaluate.requested.v1}
livequiz.messaging.submission.retry-routing-key=${LIVEQUIZ_MESSAGING_SUBMISSION_RETRY_ROUTING_KEY:submission.evaluate.retry.v1}
livequiz.messaging.submission.failed-routing-key=${LIVEQUIZ_MESSAGING_SUBMISSION_FAILED_ROUTING_KEY:submission.evaluate.failed.v1}
livequiz.messaging.submission.max-attempts=${LIVEQUIZ_MESSAGING_SUBMISSION_MAX_ATTEMPTS:6}
livequiz.messaging.submission.consumer-concurrency=${LIVEQUIZ_MESSAGING_SUBMISSION_CONSUMER_CONCURRENCY:2}

livequiz.messaging.outbox.poll-interval-ms=${LIVEQUIZ_MESSAGING_OUTBOX_POLL_INTERVAL_MS:500}
livequiz.messaging.outbox.batch-size=${LIVEQUIZ_MESSAGING_OUTBOX_BATCH_SIZE:100}

livequiz.email.ses.max-per-second=${LIVEQUIZ_EMAIL_SES_MAX_PER_SECOND:1}
livequiz.email.ses.max-per-day=${LIVEQUIZ_EMAIL_SES_MAX_PER_DAY:200}

# Answer evaluation provider config
livequiz.answer-evaluation.provider=${LIVEQUIZ_ANSWER_EVALUATION_PROVIDER:deterministic}
livequiz.answer-evaluation.openrouter.api-url=${LIVEQUIZ_ANSWER_EVALUATION_OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
livequiz.answer-evaluation.openrouter.api-key=${LIVEQUIZ_ANSWER_EVALUATION_OPENROUTER_API_KEY:}
livequiz.answer-evaluation.openrouter.model=${LIVEQUIZ_ANSWER_EVALUATION_OPENROUTER_MODEL:openai/gpt-4o-mini}
livequiz.answer-evaluation.openrouter.app-name=${LIVEQUIZ_ANSWER_EVALUATION_OPENROUTER_APP_NAME:LiveQuiz}
livequiz.answer-evaluation.openrouter.site-url=${LIVEQUIZ_ANSWER_EVALUATION_OPENROUTER_SITE_URL:}
