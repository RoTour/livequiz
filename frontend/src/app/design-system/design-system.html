<section class="lq-page lq-grid">
  <header class="lq-page-header">
    <h1 class="lq-page-title">LiveQuiz Design System</h1>
    <p class="lq-page-subtitle">Config-free Tailwind v4 tokens and reusable primitives used across app routes.</p>
  </header>

  <article class="lq-card lq-stack">
    <h2 class="lq-card-title">Buttons</h2>
    <div class="lq-row">
      <button type="button" class="lq-btn lq-btn-primary">Primary</button>
      <button type="button" class="lq-btn lq-btn-secondary">Secondary</button>
      <button type="button" class="lq-btn lq-btn-neutral">Neutral</button>
      <button type="button" class="lq-btn lq-btn-danger">Danger</button>
    </div>
  </article>

  <article class="lq-card lq-stack">
    <h2 class="lq-card-title">Form controls</h2>
    <input class="lq-input" value="Lecture title" />
    <textarea class="lq-textarea">Type student answer here...</textarea>
  </article>

  <article class="lq-card lq-stack">
    <h2 class="lq-card-title">Status and feedback</h2>
    <div class="lq-row">
      <span class="lq-chip lq-chip-success">active</span>
      <span class="lq-chip lq-chip-warning">revoked</span>
      <span class="lq-chip lq-chip-muted">expired</span>
    </div>
    <p class="lq-alert lq-alert-info">Informational message with action context.</p>
    <p class="lq-alert lq-alert-danger">Error message with clear recovery guidance.</p>
  </article>
</section>
