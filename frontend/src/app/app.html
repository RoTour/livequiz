<app-backend-status/>
<div class="min-h-screen bg-slate-50 text-slate-900">
  @if (authService.isAuthenticated()) {
    <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
        <div class="flex items-center gap-3">
          <a [routerLink]="authService.routeForCurrentUser()" class="text-lg font-semibold tracking-tight text-slate-900">
            LiveQuiz
          </a>
          @if (authService.role(); as role) {
            <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700">
              {{ role }}
            </span>
          }
        </div>

        <nav class="flex items-center gap-2 text-sm font-medium text-slate-700">
          @if (authService.role() === 'INSTRUCTOR') {
            <a
              routerLink="/instructor"
              routerLinkActive="bg-slate-900 text-white"
              [routerLinkActiveOptions]="{ exact: true }"
              class="rounded-md px-3 py-1.5 transition-colors hover:bg-slate-100"
            >
              Instructor
            </a>
          }

          @if (authService.role() === 'STUDENT') {
            <a
              routerLink="/student"
              routerLinkActive="bg-slate-900 text-white"
              [routerLinkActiveOptions]="{ exact: true }"
              class="rounded-md px-3 py-1.5 transition-colors hover:bg-slate-100"
            >
              Student
            </a>
          }

          <button
            type="button"
            class="ml-2 rounded-md border border-slate-300 px-3 py-1.5 text-slate-700 transition-colors hover:bg-slate-100"
            (click)="logout()"
          >
            Log out
          </button>
        </nav>
      </div>
    </header>
  }

  <main class="mx-auto max-w-5xl px-4 py-6">
    <router-outlet />
  </main>
</div>
