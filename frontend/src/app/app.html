<app-backend-status/>
<div class="lq-shell">
  @if (authService.isAuthenticated()) {
    <header class="lq-topbar">
      <div class="lq-topbar-inner">
        <div class="lq-row">
          <a [routerLink]="authService.routeForCurrentUser()" class="lq-brand">
            LiveQuiz
          </a>
          @if (authService.role(); as role) {
            <span class="lq-role-chip">
              {{ role }}
            </span>
          }
        </div>

        <nav class="lq-nav">
          @if (authService.role() === 'INSTRUCTOR') {
            <a
              routerLink="/instructor"
              routerLinkActive="lq-btn-primary"
              [routerLinkActiveOptions]="{ exact: true }"
              class="lq-btn lq-btn-neutral"
            >
              Instructor
            </a>
          }

          @if (authService.role() === 'STUDENT') {
            <a
              routerLink="/student"
              routerLinkActive="lq-btn-primary"
              [routerLinkActiveOptions]="{ exact: true }"
              class="lq-btn lq-btn-neutral"
            >
              Student
            </a>
          }

          <button
            type="button"
            class="lq-btn lq-btn-danger"
            (click)="logout()"
          >
            Log out
          </button>
        </nav>
      </div>
    </header>
  }

  <main class="lq-main">
    <router-outlet />
  </main>
</div>
