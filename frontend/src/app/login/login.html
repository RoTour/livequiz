<section class="lq-page">
  <header class="lq-page-header">
    <h1 class="lq-page-title">Auth Form</h1>
    <p class="lq-page-subtitle">Use your instructor or student credentials to continue.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="lq-stack">
    <div class="lq-stack">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" placeholder="Enter your username" class="lq-input" />
    </div>

    <div class="lq-stack">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Enter your password" class="lq-input" />
    </div>

    @if (form.get('username')?.invalid && form.get('username')?.touched) {
      <p class="lq-alert lq-alert-danger">Username is required.</p>
    }

    <button type="submit" [disabled]="form.invalid || form.disabled" class="lq-btn lq-btn-primary">Login</button>

    @if (authErrorMessage()) {
      <p class="lq-alert lq-alert-danger">{{ authErrorMessage() }}</p>
    }
  </form>
</section>
