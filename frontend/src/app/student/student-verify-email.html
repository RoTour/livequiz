<section class="lq-page lq-stack">
  <h1 class="lq-page-title">Student access link</h1>
  <p class="lq-status-line">{{ status() }}</p>

  @if (errorMessage()) {
    <p class="lq-alert lq-alert-danger">{{ errorMessage() }}</p>
    <button type="button" class="lq-btn lq-btn-secondary" (click)="goToLogin()">
      Go to login
    </button>
  } @else if (verified()) {
    <p class="lq-alert lq-alert-info">Email confirmed and session restored. Redirecting to your student lectures...</p>
  } @else {
    <p class="lq-alert lq-alert-info">Please wait while we validate your secure student link.</p>
  }
</section>
