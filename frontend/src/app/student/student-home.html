<section class="lq-page lq-grid">
  <header class="lq-page-header">
    <h1 class="lq-page-title">Student Workspace</h1>
    <p class="lq-page-subtitle">Join with invite code and answer unlocked questions.</p>
    <p class="lq-status-line">{{ status() }}</p>
  </header>

  <app-join-lecture-panel
    [joinLectureForm]="joinLectureForm"
    [selectedLectureId]="selectedLectureId()"
    [joinResult]="joinResult()"
    (joinLecture)="joinLecture()"
  />

  <app-answer-flow-panel
    [selectedLectureId]="selectedLectureId()"
    [nextQuestion]="nextQuestion()"
    [answerStatuses]="answerStatuses()"
    [submitAnswerForm]="submitAnswerForm"
    [cooldownMessage]="cooldownMessage()"
    [manualReloadDisabled]="manualReloadDisabled()"
    (loadNextQuestion)="loadNextQuestion()"
    (submitAnswer)="submitAnswer()"
  />
</section>
