<section class="lq-page lq-grid">
  <header class="lq-page-header">
    <h1 class="lq-page-title">Instructor Workspace</h1>
    <p class="lq-page-subtitle">Create your lecture, add questions, and unlock progression.</p>
    <p class="lq-status-line">{{ status() }}</p>
  </header>

  <app-question-flow-panel
    [form]="addQuestionForm"
    [selectedLectureId]="selectedLectureId()"
    (addQuestion)="addQuestion()"
    (unlockNext)="unlockNextQuestion()"
    (refreshState)="refreshLectureState()"
  />

  <app-invite-management-panel
    [selectedLectureId]="selectedLectureId()"
    [lastCreatedInvite]="lastCreatedInvite()"
    [invites]="invites()"
    (createInvite)="createInvite()"
    (refreshInvites)="refreshInvites()"
    (revokeInvite)="revokeInvite($event)"
  />

  <app-lecture-state-panel [lectureState]="lectureState()" (unlockQuestion)="unlockQuestion($event)" />
</section>
